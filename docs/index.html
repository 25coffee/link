<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寻找创业合伙人</title>
    <meta
      name="description"
      content="寻找创业合伙人：填写信息提交后，会在页面展示标题、内容、昵称与联系方式。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header class="container header">
      <div class="header__left">
        <h1 class="title">寻找创业合伙人</h1>
        <p class="subtitle">
          点“填写信息”去腾讯表单提交后，你的信息会出现在下方列表（标题 / 内容 /
          昵称 / 联系方式）。
        </p>
      </div>
      <div class="header__right">
        <a id="formLink" class="btn btn--primary" href="#" target="_blank" rel="noreferrer">
          填写信息
        </a>
        <button id="refreshBtn" class="btn btn--ghost" type="button">刷新列表</button>
      </div>
    </header>

    <main class="container main">
      <section class="panel">
        <div class="panel__head">
          <h2 class="panel__title">最新提交</h2>
          <div class="panel__meta">
            <span id="countText" class="muted">加载中…</span>
            <span class="dot">·</span>
            <span id="updatedText" class="muted"></span>
          </div>
        </div>

        <div id="errorBox" class="error" hidden></div>

        <div id="emptyState" class="empty" hidden>
          <div class="empty__title">暂无展示内容</div>
          <div class="empty__desc">
            你可以先点击右上角“填写信息”提交一条，然后把回收数据同步到
            <code>data/submissions.json</code>。
          </div>
        </div>

        <div id="list" class="list" aria-live="polite"></div>
      </section>
    </main>

    <div id="contactModal" class="modal" hidden>
      <div class="modal__backdrop"></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-label="显示联系方式">
        <div id="payStep" class="modal__step">
          <div class="modal__title">经营码支付</div>
          <div class="modal__desc">
            解锁联系方式 <b>¥2.99 / 次</b>。请扫码完成支付，然后继续填写交易单号确认。
          </div>
          <div class="modal__grid">
            <button class="paycard" type="button" data-pay="alipay">
              <img class="paycard__img" src="./assets/pay/alipay-pay.png" alt="支付宝收款码" />
              <div class="paycard__label">支付宝</div>
            </button>
            <button class="paycard" type="button" data-pay="wechat">
              <img class="paycard__img" src="./assets/pay/wechat-pay.png" alt="微信收款码" />
              <div class="paycard__label">微信</div>
            </button>
          </div>
          <div class="modal__hint">点击你使用的支付方式，进入交易单号确认。</div>
        </div>

        <div id="confirmStep" class="modal__step" hidden>
          <div class="modal__title">已支付确认</div>
          <div class="modal__desc">请输入交易单号（<b>28 位数字</b>）以解锁本条联系方式。</div>
          <div class="formrow">
            <input
              id="txInput"
              class="input"
              inputmode="numeric"
              autocomplete="off"
              placeholder="请输入 28 位交易单号"
            />
            <button id="txConfirmBtn" class="btn btn--primary" type="button">确认解锁</button>
          </div>
          <div id="txError" class="formerror" hidden>未找到此交易单号。</div>
          <div class="modal__hint">提示：交易单号必须为 0-9 的 28 位数字。</div>
        </div>
      </div>
    </div>

    <footer class="container footer"></footer>

    <script src="./assets/main.js" defer></script>
  </body>
</html>
